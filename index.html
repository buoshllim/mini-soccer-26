<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Mini Soccer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; overflow: hidden; }
    #app { width: 100vw; height: 100vh; position: relative; }
    #three-canvas { position: fixed; inset: 0; }
    #hud-canvas { position: fixed; inset: 0; pointer-events: none; }
    #screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="three-canvas"></canvas>
    <canvas id="hud-canvas"></canvas>
    <div id="screen"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
